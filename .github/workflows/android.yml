name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

env:
  GODOT_VERSION: "4.3"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Godot + export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Create debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore ~/debug.keystore -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Point Godot at the Android SDK (preinstalled on the runner)
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.3.tres <<SETTINGS
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

      - name: Export APK
        run: |
          mkdir -p build
          ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --import || true
          ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --export-debug "Android" build/ZombieTrainEscape.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZombieTrainEscape-apk
          path: build/ZombieTrainEscape.apk
